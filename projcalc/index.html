<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Projector Installation Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  /* --- Theme Variables --- */
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f4f4f5;
    --color-background-info: #eff6ff;
    --color-background-warning: #fffbeb;
    --color-background-success: #f0fdf4;
    --color-background-danger: #fef2f2;
    
    --color-border-secondary: #e4e4e7;
    --color-border-tertiary: #d4d4d8;
    --color-border-info: #3b82f6;
    --color-border-warning: #f59e0b;
    --color-border-success: #10b981;
    --color-border-danger: #ef4444;
    
    --color-text-primary: #18181b;
    --color-text-secondary: #52525b;
    --color-text-tertiary: #71717a;
    --color-text-info: #2563eb;
    --color-text-warning: #d97706;
    --color-text-success: #059669;
    --color-text-danger: #dc2626;
    
    --font-sans: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    --border-radius-sm: 4px;
    --transition-speed: 0.2s;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --color-background-primary: #18181b;
      --color-background-secondary: #27272a;
      --color-background-info: #172554;
      --color-background-warning: #422006;
      --color-background-success: #052e16;
      --color-background-danger: #450a0a;

      --color-border-secondary: #3f3f46;
      --color-border-tertiary: #52525b;
      --color-border-info: #3b82f6;
      --color-border-warning: #f59e0b;
      --color-border-success: #10b981;
      --color-border-danger: #ef4444;

      --color-text-primary: #f4f4f5;
      --color-text-secondary: #d4d4d8;
      --color-text-tertiary: #a1a1aa;
      --color-text-info: #60a5fa;
      --color-text-warning: #fbbf24;
      --color-text-success: #34d399;
      --color-text-danger: #f87171;
    }
  }

  :root[data-theme="dark"] {
    --color-background-primary: #18181b;
    --color-background-secondary: #27272a;
    --color-background-info: #172554;
    --color-background-warning: #422006;
    --color-background-success: #052e16;
    --color-background-danger: #450a0a;
    --color-border-secondary: #3f3f46;
    --color-border-tertiary: #52525b;
    --color-border-info: #3b82f6;
    --color-border-warning: #f59e0b;
    --color-border-success: #10b981;
    --color-border-danger: #ef4444;
    --color-text-primary: #f4f4f5;
    --color-text-secondary: #d4d4d8;
    --color-text-tertiary: #a1a1aa;
    --color-text-info: #60a5fa;
    --color-text-warning: #fbbf24;
    --color-text-success: #34d399;
    --color-text-danger: #f87171;
  }

  /* --- Reset & Layout --- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: var(--font-sans); 
    background: var(--color-background-primary); 
    color: var(--color-text-primary);
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    display: flex;
  }

  .g { display: flex; width: 100%; height: 100%; overflow: hidden; }

  /* Left Sidebar */
  .lp {
    width: 320px; flex-shrink: 0;
    border-right: 1px solid var(--color-border-tertiary);
    padding: 12px; overflow-y: auto;
    display: flex; flex-direction: column;
    background: var(--color-background-secondary);
  }

  /* Right Content */
  .rp { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100%; background: var(--color-background-primary); }
  .dia { flex: 1; position: relative; min-height: 200px; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .res {
    border-top: 1px solid var(--color-border-tertiary);
    padding: 10px; display: flex; flex-wrap: wrap; gap: 6px;
    height: auto; max-height: 35%; overflow-y: auto;
    align-content: flex-start; background: var(--color-background-primary);
  }

  /* --- Typography & Form Elements --- */
  .sec { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-tertiary); border-bottom: 1px solid var(--color-border-tertiary); padding-bottom: 4px; margin-top: 12px; margin-bottom: 6px; flex-shrink: 0; }
  .f { display: flex; align-items: center; gap: 5px; height: 24px; margin-bottom: 3px; flex-shrink: 0; }
  .f label { font-size: 12px; color: var(--color-text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  input[type=number], select, input[type=text] {
    font-family: var(--font-mono); font-size: 12px; background: var(--color-background-primary);
    border: 1px solid var(--color-border-tertiary); color: var(--color-text-primary);
    border-radius: var(--border-radius-sm); outline: none; transition: border-color var(--transition-speed);
  }
  .f input[type=number], .f select { text-align: right; width: 75px; padding: 2px 6px; height: 24px; flex-shrink: 0; }
  input:focus, select:focus { border-color: var(--color-border-info); }

  input[type=range] { -webkit-appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--color-text-info); margin-top: -4px; cursor: pointer; }

  .ro { background: transparent !important; border-color: transparent !important; color: var(--color-text-tertiary) !important; cursor: default; }
  .inp-p { background: var(--color-background-warning) !important; border-color: var(--color-border-warning) !important; color: var(--color-text-warning) !important; }
  .u { font-size: 10px; color: var(--color-text-tertiary); width: 16px; flex-shrink: 0; text-align: left; }
  
  .lkbtn { width: 22px; height: 22px; flex-shrink: 0; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-sm); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-tertiary); transition: all var(--transition-speed); }
  .lkbtn:hover { background: var(--color-background-secondary); }
  .lkbtn.on { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
  .lkbtn.pl { background: var(--color-background-warning); border-color: var(--color-border-warning); color: var(--color-text-warning); cursor: default; }
  .drv { border-color: var(--color-border-success) !important; background: var(--color-background-success) !important; color: var(--color-text-success) !important; }

  .rr { display: flex; gap: 4px; height: 24px; margin-bottom: 4px; flex-shrink: 0; }
  .rr input { display: none; }
  .rr label { flex: 1; font-size: 11px; text-align: center; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-sm); cursor: pointer; color: var(--color-text-secondary); user-select: none; height: 24px; display: flex; align-items: center; justify-content: center; transition: all var(--transition-speed); }
  .rr input:checked + label { border-color: var(--color-border-info); color: var(--color-text-info); background: var(--color-background-info); font-weight: 600; }

  .pbox { background: var(--color-background-warning); color: var(--color-text-warning); border-radius: var(--border-radius-sm); padding: 6px; margin-bottom: 4px; font-size: 10px; line-height: 1.4; display: none; gap: 8px; flex-shrink: 0; }
  .pbox.on { display: flex; }
  .pi-t { flex: 1; }
  .pi-c { cursor: pointer; font-size: 10px; text-decoration: underline; white-space: nowrap; flex-shrink: 0; font-weight: 600; }

  .psel { width: 100%; font-size: 12px; padding: 4px 6px; height: 26px; margin-bottom: 6px; flex-shrink: 0; }
  .tog { display: flex; align-items: center; gap: 6px; height: 24px; margin-bottom: 4px; flex-shrink: 0; }
  .tog label { font-size: 11px; color: var(--color-text-secondary); flex: 1; }
  
  .rname-inp { width:100%; font-size:11px; height:24px; padding:2px 6px; margin-bottom:3px; flex-shrink:0; font-family:var(--font-sans); background:var(--color-background-primary); border:1px solid var(--color-border-tertiary); color:var(--color-text-primary); border-radius:var(--border-radius-sm); outline:none; box-sizing:border-box; }
  .rname-inp:focus { border-color:var(--color-border-info); }
  .rp-btns { display:flex; gap:4px; margin-bottom:4px; flex-shrink:0; }
  .rp-btns button { font-size:11px; padding:0 8px; border:1px solid var(--color-border-secondary); border-radius:var(--border-radius-sm); background:transparent; color:var(--color-text-primary); cursor:pointer; height:24px; flex:1; }
  .whlk-row { display:flex; align-items:center; justify-content:flex-end; gap:4px; height:18px; margin-bottom:1px; flex-shrink:0; padding-right:18px; }
  .whlk-lbl { font-size:9px; color:var(--color-text-tertiary); letter-spacing:0.04em; }

  .themebtn { position:absolute; top:8px; right:8px; z-index:10; width:28px; height:28px; border:1px solid var(--color-border-tertiary); border-radius:var(--border-radius-sm); background:var(--color-background-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text-tertiary); font-size:14px; transition:all var(--transition-speed); }
  .themebtn:hover { background:var(--color-background-primary); color:var(--color-text-primary); }
  .rp { position:relative; }

  .rc { background: var(--color-background-secondary); border-radius: var(--border-radius-sm); padding: 5px 8px; flex: 1 1 140px; }
  .rc.tw { background: var(--color-background-warning); flex: 1 1 100%; }
  .rl { font-size: 9px; color: var(--color-text-tertiary); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .rv { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--color-text-primary); }
  .rv.warn { color: var(--color-text-danger); }
  .rv.ok { color: var(--color-text-success); }
  .rv.ti { color: var(--color-text-warning); }
  .ba { font-size: 8px; padding: 2px 4px; border-radius: 3px; margin-top: 3px; display: inline-block; font-weight: 600; text-transform: uppercase; }
  .ba.ok { background: var(--color-background-success); color: var(--color-text-success); }
  .ba.warn { background: var(--color-background-danger); color: var(--color-text-danger); }
  .tlbl { width: 100%; font-size: 9px; color: var(--color-text-warning); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding-top: 4px; border-top: 1px solid var(--color-border-warning); margin-top: 2px; }
  .ar-info { font-size: 9px; color: var(--color-text-warning); margin-top: 2px; line-height: 1.3; }

  /* Mobile */
  @media (max-width: 600px) {
    .lp { width: 185px; padding: 8px 6px; }
    .f label { font-size: 10px; }
    .f input[type=number], .f select { width: 55px; font-size: 10px; padding: 2px 4px; }
    .u { font-size: 9px; width: 12px; }
    .sec { font-size: 9px; margin-top: 8px; }
    .rc { flex: 1 1 120px; }
    #zoomSlider { width: 55px !important; }
  }

  .printbtn { position:absolute; top:8px; right:42px; z-index:10; width:28px; height:28px; border:1px solid var(--color-border-tertiary); border-radius:var(--border-radius-sm); background:var(--color-background-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text-tertiary); font-size:13px; transition:all var(--transition-speed); }
  .printbtn:hover { background:var(--color-background-primary); color:var(--color-text-primary); }
  #printImg { display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }

  /* ── Print styles ────────────────────────────────────────────── */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }

    body { width: auto; height: auto; overflow: visible; }
    .g   { height: auto; min-height: 0; }

    /* Sidebar – narrow, all overflow visible */
    .lp {
      width: 220px; flex-shrink: 0; overflow: visible;
      padding: 4px 6px; font-size: 10px;
      background: transparent; border-right: 1px solid #ccc;
    }
    .sec { font-size: 8px; margin-top: 6px; }
    .f { height: auto; margin-bottom: 2px; }
    .f label { font-size: 10px; }

    /* Style inputs/selects as plain read values */
    input[type=number], input[type=text], select {
      border: none !important; background: transparent !important;
      -webkit-appearance: none; appearance: none;
      font-size: 10px !important; width: auto !important;
      padding: 0 !important; color: inherit !important;
      box-shadow: none !important; height: auto !important;
    }
    input[type=range], input[type=checkbox] { display: none !important; }
    input[type=radio] { display: none !important; }
    .rr { height: auto; gap: 3px; margin-bottom: 3px; }
    .rr label { border: none; font-size: 10px; padding: 0; height: auto; display: inline; }
    .rr input:checked + label { font-weight: 700; background: transparent; color: inherit; }

    /* Hide interactive chrome */
    .lkbtn, .rp-btns, #rname, #rsel, #zoomRow, #shiftCurveWrap,
    .pbox, .whlk-row, .themebtn, .printbtn,
    #arInfo, #dropModeRow, .tog ~ .f:last-of-type { display: none !important; }

    /* Right panel – fill remaining width, fixed height */
    .rp { flex: 1; min-width: 0; height: auto; background: transparent; position: relative; display: flex; flex-direction: column; }
    .dia { flex: 1; position: relative; min-height: 0; height: 430px; }

    /* Swap canvas for captured image */
    #cv { display: none !important; }
    #printImg { display: block !important; }

    /* Results bar */
    .res {
      max-height: none; overflow: visible; padding: 6px;
      border-top: 1px solid #ccc; gap: 4px; flex-wrap: wrap;
      background: transparent;
    }
    .rc { flex: 1 1 110px; padding: 4px 6px; background: #f4f4f5 !important; }
    .rl { font-size: 8px; }
    .rv { font-size: 11px; }
    .ba { font-size: 7px; }
  }
</style>
</head>
<body>

<div class="g">
 <div class="lp">
  <div class="sec" style="margin-top:0">Projector preset</div>
  <select class="psel" id="psel"></select>
  <div class="pbox" id="pbox"><div class="pi-t" id="pi-t"></div><span class="pi-c" id="pi-c">Clear</span></div>

  <div class="sec">Setup preset</div>
  <select class="psel" id="rsel"></select>
  <input type="text" id="rname" class="rname-inp" placeholder="Save as..." maxlength="24">
  <div class="rp-btns">
    <button id="rsave">Save</button>
    <button id="rdel">Del</button>
  </div>

  <div class="sec">Room</div>
  <div class="f"><label>Ceiling height</label><input type="number" id="ceilH" value="500" step="5" min="50" max="3000"><span class="u">cm</span></div>
  <div class="f"><label>Wall height</label><input type="number" id="wallH" value="300" step="5" min="50" max="3000"><span class="u">cm</span></div>
  <div class="f">
   <label>Throw distance</label>
   <input type="number" id="dist" value="200" step="5" min="20" max="5000">
   <button class="lkbtn" id="lkDist" title="Lock Throw Distance"></button><span class="u">cm</span>
  </div>

  <div class="sec">Image & Media</div>
  <div class="f">
    <label>Media aspect ratio</label>
    <select id="aspect">
      <option value="1.77777778">16:9</option>
      <option value="1.6">16:10</option>
      <option value="1.33333333">4:3</option>
      <option value="2.37037037">21:9</option>
    </select>
    <span class="u"></span>
  </div>
  <div id="arInfo" class="ar-info" style="display:none;"></div>
  
  <div class="f">
   <label>Throw ratio</label>
   <input type="number" id="ratio" value="1.35" step="0.01" min="0.05" max="20">
   <button class="lkbtn" id="lkRatio" title="Lock Throw Ratio"></button><span class="u">:1</span>
  </div>
  <div id="zoomRow" style="display:none; flex-shrink:0; margin-top:0; margin-bottom:6px; padding:0 1px;">
   <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:1px;">
    <span style="font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;">Zoom</span>
    <span id="zoomVal" style="font-size:10px;font-family:var(--font-mono);color:var(--color-text-info);font-weight:600;"></span>
   </div>
   <input type="range" id="zoomSlider" style="width:100%;display:block;margin:0;padding:0;cursor:pointer;">
  </div>

  <div class="f"><label>Media width</label><input type="number" id="imgW" value="148" step="1" min="10" max="3000"><span class="u">cm</span></div>
  <div class="whlk-row"><span class="whlk-lbl">lock W+H</span><button class="lkbtn" id="lkImgW" title="Lock both media dimensions (W and H together)"></button></div>
  <div class="f"><label>Media height</label><input type="number" id="imgH" step="1" min="10" max="3000"><span class="u">cm</span></div>

  <div class="sec">Media position on wall</div>
  <div class="rr">
    <input type="radio" name="pt" id="ptB" value="bottom"><label for="ptB">Bottom</label>
    <input type="radio" name="pt" id="ptC" value="center" checked><label for="ptC">Center</label>
    <input type="radio" name="pt" id="ptT" value="top"><label for="ptT">Top</label>
  </div>
  <div class="f"><label id="posLbl">Center height</label><input type="number" id="targetH" value="150" step="5" min="0"><span class="u">cm</span></div>

  <div class="sec">Lens shift (V)</div>
  <div class="f"><label>Shift %</label><input type="number" id="sPct" value="0" step="0.5"><span class="u">%</span></div>
  <div class="f"><label>Shift mm (sync)</label><input type="number" id="sMm" step="1"><span class="u">mm</span></div>
  <div class="f">
    <label>Spec limit +/−</label>
    <input type="number" id="maxUp" value="50" step="1" min="0" style="width:26px">
    <span style="font-size:10px;color:var(--color-text-tertiary);padding:0 2px;">/ −</span>
    <input type="number" id="maxDn" value="50" step="1" min="0" style="width:26px">
    <span class="u" style="margin-left:2px">%</span>
  </div>
  <div id="shiftCurveWrap" style="display:none; flex-shrink:0; margin-bottom:4px;">
    <div style="font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">Shift range @ ratio</div>
    <svg id="shiftCurveSvg" style="width:100%;height:58px;display:block;border-radius:3px;overflow:visible;"></svg>
  </div>

  <div class="sec">Lens shift (H)</div>
  <div class="f"><label>H shift %</label><input type="number" id="hPct" value="0" step="0.5"><span class="u">%</span></div>
  <div class="f">
    <label>Spec limit ±</label>
    <input type="number" id="maxH" value="0" step="1" min="0" style="width:42px">
    <span class="u" style="margin-left:2px">%</span>
  </div>

  <div class="sec">Projector mounting</div>
  <div class="rr" style="margin-bottom:5px;">
    <input type="radio" name="mount" id="mtCeil" value="ceiling" checked><label for="mtCeil">Ceiling</label>
    <input type="radio" name="mount" id="mtFloor" value="floor"><label for="mtFloor">Pedestal</label>
  </div>
  <div class="f">
   <label id="dropLbl">Drop from ceiling</label>
   <input type="number" id="dropV" value="200" step="1" min="0">
   <button class="lkbtn" id="lkDrop" title="Lock Drop"></button><span class="u">cm</span>
  </div>
  <div class="f" id="dropModeRow" style="height:12px; margin-bottom:2px">
   <label style="font-size:9px; color:var(--color-text-tertiary)" id="dropModeLabel">Derived from media position</label>
  </div>
  <div class="f">
   <label id="bodyHLbl">Lens to mount top</label>
   <input type="number" id="bodyH" value="13.6" step="0.5" min="0">
   <button class="lkbtn" id="lkBody" title="Lock Body Height"></button><span class="u">cm</span>
  </div>

  <div class="sec">Tilt</div>
  <div class="f"><label>Tilt angle (down +)</label><input type="number" id="tiltDeg" value="0" step="0.5" min="-45" max="45"><span class="u">°</span></div>
  <div class="f"><label>Max keystone limit</label><input type="number" id="maxKS" value="30" step="1" min="0" max="90"><button class="lkbtn" id="lkKS" title="Lock Keystone"></button><span class="u">°</span></div>

  <div class="sec">Person / shadow check</div>
  <div class="tog"><label>Show 175 cm person</label><input type="checkbox" id="personOn"></div>
  <div class="f"><label>Person distance</label><input type="number" id="personDist" value="200" step="5" min="10"><span class="u">cm</span></div>
 </div>

 <div class="rp">
  <button class="themebtn" id="themeBtn" title="Toggle light/dark mode">☀</button>
  <button class="printbtn" id="printBtn" title="Print / Save as PDF">⎙</button>
  <div class="dia"><canvas id="cv"></canvas><img id="printImg" alt="diagram"></div>
  <div class="res" id="res"></div>
 </div>
</div>

<script>
  // Register service worker for PWA offline support
  // Note: requires HTTPS or localhost — won't activate over file:// protocol
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
